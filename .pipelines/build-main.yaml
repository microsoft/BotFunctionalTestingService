# Place this file in BotFunctionalTestingService repo as .pipelines/trigger-build-main.yaml

trigger:
  branches:
    include:
    - master

resources:
  repositories:
  - repository: HealthBotDevOps
    type: git
    name: HealthBotDevOps
    ref: refs/heads/main
  - repository: onebranchTemplates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main
  - repository: pes-utils
    type: git
    name: pes-utils
    ref: refs/heads/main

  pipelines:
  - pipeline: '[HealthBotDevOps] [dockerfile] [master]'
    source: '[HealthBotDevOps] [dockerfile] [master]'
    trigger:
      branches:
        include:
        - refs/heads/main

variables:
- name: LinuxContainerImage
  value: mcr.microsoft.com/onebranch/azurelinux/build:3.0

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@onebranchTemplates
  parameters:
    globalSdl:
      tsa:
        enabled: false
    stages:
    - template: .pipelines/bot-functional-tester/templates/stages-main.yml@HealthBotDevOps
